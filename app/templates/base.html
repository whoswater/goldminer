<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GoldMiner - 业绩预期分析{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { background: #f5f6fa; }
        .search-hero { padding: 60px 0 40px; text-align: center; }
        .search-hero h1 { font-size: 2rem; font-weight: 700; }
        .search-box { max-width: 600px; margin: 0 auto; }
        .signal-positive { color: #28a745; font-weight: bold; }
        .signal-negative { color: #dc3545; font-weight: bold; }
        .strength-bar { display: inline-block; width: 6px; margin-right: 1px; border-radius: 1px; }
        .card-earnings { border-left: 4px solid #28a745; }
        .card-warning { border-left: 4px solid #dc3545; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">GoldMiner</a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">搜索</a></li>
                <li class="nav-item"><a class="nav-link" href="/history">搜索记录</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
