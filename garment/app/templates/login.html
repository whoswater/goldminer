<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 潘记制衣厂管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { width: 380px; border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.1); border-radius: 12px; }
        .login-card .card-body { padding: 40px 35px; }
        .login-title { font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 30px; color: #333; }
        .form-control { height: 48px; font-size: 16px; border-radius: 8px; }
        .btn-login { height: 48px; font-size: 16px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card login-card">
        <div class="card-body">
            <div class="login-title">潘记制衣厂管理系统</div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} py-2" role="alert">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">手机号</label>
                    <input type="tel" name="phone" class="form-control" placeholder="请输入手机号"
                           maxlength="11" pattern="[0-9]{11}" autofocus required>
                </div>
                <div class="mb-4">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-control" placeholder="默认密码为手机号后6位" required>
                </div>
                <button type="submit" class="btn btn-primary btn-login w-100">登录</button>
            </form>
        </div>
    </div>
</body>
</html>
