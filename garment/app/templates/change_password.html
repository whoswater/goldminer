<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 潘记制衣厂管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .pwd-card { width: 400px; border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.1); border-radius: 12px; }
        .pwd-card .card-body { padding: 40px 35px; }
        .pwd-title { font-size: 20px; font-weight: 600; text-align: center; margin-bottom: 8px; color: #333; }
        .pwd-subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 25px; }
        .form-control { height: 46px; font-size: 15px; border-radius: 8px; }
        .btn-submit { height: 46px; font-size: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card pwd-card">
        <div class="card-body">
            <div class="pwd-title">修改密码</div>
            {% if first_time %}
            <div class="pwd-subtitle">首次登录，请设置新密码后继续使用</div>
            {% else %}
            <div class="pwd-subtitle">{{ g.user['name'] }}</div>
            {% endif %}

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} py-2">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                {% if not first_time %}
                <div class="mb-3">
                    <label class="form-label">旧密码</label>
                    <input type="password" name="old_password" class="form-control" placeholder="请输入当前密码" required>
                </div>
                {% endif %}
                <div class="mb-3">
                    <label class="form-label">新密码</label>
                    <input type="password" name="new_password" class="form-control" placeholder="至少6位" minlength="6" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">确认新密码</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="再输入一次新密码" minlength="6" required>
                </div>
                <button type="submit" class="btn btn-primary btn-submit w-100">确认修改</button>
            </form>
        </div>
    </div>
</body>
</html>
